services:
  postgres:
    image: postgres:16-alpine
    container_name: social-clubs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: social_clubs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./db/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d social_clubs" ]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: social-clubs-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/social_clubs
      PG_POOL_MAX: 20
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
